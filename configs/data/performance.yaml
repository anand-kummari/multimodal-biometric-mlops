# Performance-tuned configuration for benchmarking data loading
dataset:
  name: multimodal_biometric
  num_subjects: 45
  iris_images_per_eye: 5
  fingerprints_per_subject: 10

  iris_size: [224, 224]
  fingerprint_size: [224, 224]

  modalities:
    - iris_left
    - iris_right
    - fingerprint

dataloader:
  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  drop_last: true

  split:
    train: 0.7
    val: 0.15
    test: 0.15

cache:
  enabled: true
  backend: pyarrow
  compression: zstd  # Better compression ratio for large-scale

preprocessing:
  parallel:
    enabled: true
    backend: ray
    num_cpus: null
