# Quick training config for debugging and smoke tests
training:
  epochs: 3
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam

  scheduler:
    type: cosine
    warmup_epochs: 1
    min_lr: 0.0001

  mixed_precision: false

  gradient_clip:
    enabled: false
    max_norm: 1.0

  early_stopping:
    enabled: false
    patience: 3
    metric: val_loss
    mode: min

  checkpointing:
    enabled: false
    save_best: false
    save_last: false
    metric: val_loss
    mode: min
