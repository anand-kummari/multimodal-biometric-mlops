model:
  name: simple_cnn
  num_classes: 45

  iris_encoder:
    type: simple_cnn
    in_channels: 3
    feature_dim: 64
    dropout: 0.2

  fingerprint_encoder:
    type: simple_cnn
    in_channels: 1
    feature_dim: 64
    dropout: 0.2

  fusion:
    strategy: concatenation
    hidden_dim: 128
    dropout: 0.3
